# Northwest/central India heat wave, March-April 2022 — the heat vertical's
# flagship event (Sprint 9, probe-selected).
#
# SELECTION PROVENANCE (cardinal rule 1 — no event from memory): this event was
# selected by the ERA5 percentile scan (scripts/sprint9_scan_era5_heat.py;
# committed output stage_a_outputs/sprint9_heat_probe/era5_scan_results.json)
# as the top-ranked 2013-2026 candidate window passing all data-coverage
# criteria (Landsat 8+9 era, final-ERA5 window, IMD-gridded coverage, dense ISD
# stations), then verified against documented reporting (references below).
# Rejected alternatives are recorded in docs/reports/sprint9_stage_a_report.md
# §2 (June 2019: higher scan score, no Landsat 9; April 2017: no Landsat 9;
# May/June 2024: lower score + a disputed iconic station reading; March 2026:
# preliminary-ERA5T window, deprioritized per the interim probe review).
#
# The documented phenomenon is the prolonged March-April 2022 event (the
# peer-reviewed event definition in Zachariah et al. 2023 is March-April daily-
# maximum temperature averaged over the north Indian plains / southern
# Pakistan). The CANONICAL ANALYSIS WINDOW within it is 2022-04-02..2022-04-11
# (peak qualifying-area day 2022-04-08), selected by the scan's IMD-style
# criterion (T2m proxy >= 40 degC AND departure >= +4.5 K — IMD's published
# plains heat-wave definition applied to ERA5). canonical_acquisition stays
# null: it is an EMIT-shaped field (granule URs); pinning one satellite
# overpass would misrepresent a multi-day area phenomenon. The eval harness
# therefore reports this event not_runnable with an EMIT-shaped reason until
# Stage B makes runnability phenomenon-aware (flagged in the Stage A report).
#
# LST vs 2 m AIR TEMPERATURE (cardinal rule 2): every quantity below is a 2 m
# AIR temperature quantity unless explicitly marked LST. Satellite skin
# temperature (MODIS/Landsat/Sentinel-3 LST) is a different physical quantity;
# no LST value below may be compared against an air-temperature claim.

event_id: india_nw_heatwave_2022_04
name: "Northwest/central India heat wave (Mar-Apr 2022) — canonical window Apr 2-11"
planetary_body: earth

phenomenon_type: heat_wave
expected_detection_types:
  - air_temperature_anomaly   # 2 m air anomaly (ERA5/station-grounded; ADR 0003)
  - thermal_anomaly           # LST/skin anomaly (MODIS/Landsat); never conflated

# The documented event window (peer-reviewed event definition: March-April
# 2022). The canonical analysis window 2022-04-02..11 lives in the notes and
# the Stage A report — it is OUR analysis choice (scan-derived), not a claim
# about when the documented event started/ended.
date_range:
  start: "2022-03-01T00:00:00Z"
  end: "2022-04-30T23:59:59Z"

# Anomaly-weighted centroid of the scan's canonical window (mean over
# 2022-04-02..11 of daily qualifying-cell centroids) — eastern Rajasthan.
# Derived from the committed scan artifact, NOT from any reference document;
# the bbox is the largest qualifying 4-connected cluster on the peak-area day
# (2022-04-08), whole-cell bounds (stage_a_outputs/sprint9_heat_probe/
# event_region_2022_04.json). Reaches the India-Pakistan border region, which
# matches the documented event extent (Zachariah et al. 2023 includes southern
# Pakistan).
location:
  lon: 74.0
  lat: 27.3
bbox:
  min_lon: 67.875
  min_lat: 22.375
  max_lon: 84.375
  max_lat: 32.875
# Area event: recall matching uses bbox OVERLAP, not centroid distance
# (ADR 0004, landed in Stage B per the Stage A gate ruling). This value no
# longer participates in matching for area events; it documents the scale at
# which the centroid is meaningful (the event-region scale).
location_precision_km: 300.0

known_measurements:
  all_india_march_2022_mean_temp_anomaly_k:
    value: 1.61
    uncertainty: null
    unit: "K"
    reference_usability: context_only
    usability_reason: >-
      All-India monthly mean temperature anomaly against IMD's own normals and
      station network, for March — mostly outside the canonical Apr 2-11
      analysis window. Context for event severity, not a quantification target.
    note: >-
      IMD (Srivastava et al. 2024, MAUSAM): all-India mean temperature anomaly
      of +1.61 degC in March 2022; March 2022 maximum temperatures were the
      highest in 122 years (since 1901). AIR temperature quantity.
  all_india_april_2022_mean_temp_anomaly_k:
    value: 1.36
    uncertainty: null
    unit: "K"
    reference_usability: scope_mismatch
    usability_reason: >-
      Same physical quantity family as our 2 m anomaly outputs, but all-India
      monthly scope vs our regional Apr 2-11 window, and IMD's anomaly is
      relative to IMD's own normals period and station network, not our
      1991-2020 ERA5 baseline. Comparable only after Stage B recomputes the
      diagnostic at IMD's exact definition; until then a direct error number
      would be fake precision.
    note: >-
      IMD (Srivastava et al. 2024, MAUSAM): all-India mean temperature anomaly
      of +1.36 degC in April 2022, second highest since 1901; April 2022
      maximum temperatures third highest in 122 years. AIR temperature.
  nw_india_april_2022_avg_max_temp_c:
    value: 35.9
    uncertainty: null
    unit: "degC"
    reference_usability: scope_mismatch
    usability_reason: >-
      Month-long average over IMD's "northwest India" subdivision set vs our
      Apr 2-11 window over a scan-derived bbox; region definition and
      averaging window both differ. Stage B may compute the matching monthly
      diagnostic over IMD's subdivisions (from IMD gridded data) to make an
      honest comparison.
    note: >-
      Reported as IMD's figure for the hottest April in northwest India in 122
      years (average maximum temperature 35.9 degC), via press reporting of
      the IMD Director General's end-of-April 2022 statement (BusinessToday,
      2022-04-30). The IMD primary press-release URL cited in the MAUSAM paper
      (internal.imd.gov.in/press_release/20220519_pr_1634.pdf) is no longer
      reachable (404, probed 2026-06-11) — secondary-source status is stated
      rather than hidden. AIR temperature.
  event_return_period_years:
    value: 100
    uncertainty: null
    unit: "years"
    reference_usability: context_only
    usability_reason: >-
      Return period for the attribution study's own event definition (March-
      April daily-max average over north Indian plains + southern Pakistan).
      Aether does not compute return periods or attribution in this vertical's
      scope; never a target.
    note: >-
      Zachariah et al. 2023: ~1-in-100-year event in the 2022 climate.
  attribution_likelihood_factor:
    value: 30
    uncertainty: null
    unit: "dimensionless"
    reference_usability: context_only
    usability_reason: >-
      Climate-change attribution factor (event made ~30x more likely, ~1 K
      hotter than preindustrial). Out of Aether's scope by the sprint brief
      (no attribution analysis); context only.
    note: >-
      Zachariah et al. 2023 / World Weather Attribution (May 2022 report).
  prayagraj_peak_tmax_2022_04_27_c:
    value: 45.9
    uncertainty: null
    unit: "degC"
    reference_usability: scope_mismatch
    usability_reason: >-
      Single-station daily maximum during the LATER (Apr 25-30) wave, outside
      the canonical Apr 2-11 analysis window; reported via NASA Earth
      Observatory citing Indian observations, not an IMD primary table.
      Usable as a dated cross-reference only if Stage B extends analysis to
      the late-April wave.
    note: >-
      NASA Earth Observatory (2022-04-29): 45.9 degC at Prayagraj, Uttar
      Pradesh on 2022-04-27; 45.1 degC at Barmer, West Rajasthan on
      2022-04-26. AIR temperature (station observations).

# No operator/facility/sector: an area phenomenon has no source attribution in
# the methane sense. Stage C ranks contributing FACTORS instead (multi-factor
# honesty, cardinal rule 3).
attribution: {}

observed_by:
  - sensor: "ERA5 / ERA5T (ECMWF reanalysis via ARCO-ERA5 v3)"
    sensor_type: "reanalysis"
    note: >-
      2m temperature, dewpoint, winds, soil moisture, geopotential. The event
      window lies entirely inside FINAL ERA5 (coverage to 2025-12-31 measured
      at probe time) — no preliminary-ERA5T dependence.
  - sensor: "NOAA ISD synoptic surface stations (Indian network)"
    sensor_type: "ground_based"
    note: >-
      130 stations inside the event bbox with data spanning the canonical
      window (probe-verified). In-situ 2 m air temperature — the truth anchor
      for the VALIDATED-tier question. WMO Resolution 40: raw data cached
      locally only, never committed; derived statistics only.
  - sensor: "MODIS Terra (MOD11A1/MOD11A2 v061 LST)"
    sensor_type: "thermal"
    note: >-
      72 daily granules over the bbox in the canonical window (probe-verified).
      AQUA (MYD11A1) HAS A GAP exactly covering the window (no granules
      2022-04-01..04-16, measured by CMR query): daytime LST sampling is Terra
      ~10:30 local only — LST anomalies sample late morning, not the
      afternoon skin-temperature peak. First-class caveat for Stage B. LST,
      not air temperature.
  - sensor: "Landsat 8/9 TIRS (Collection-2 Level-2 Surface Temperature)"
    sensor_type: "thermal"
    note: >-
      131 L8+L9 scenes over the bbox in the canonical window, median cloud 0%
      (probe-verified via Planetary Computer STAC; the free access route).
      LST, not air temperature.
  - sensor: "IMD gridded daily Tmax (1.0 deg, station-derived)"
    sensor_type: "ground_based"
    note: >-
      Programmatic download verified (POST maxtemp.php, 365x31x31 float32
      lat-major, 99.9=missing). Station-only product — independent of ERA5;
      the ERA5-independent station-grounded reference in the dependency graph.
      License terms to be verified verbatim before committing any derived
      artifact from it (interim-review condition).

references:
  - citation: >-
      Srivastava, A., Kumar, N., & Mohapatra, M. (2024). Unprecedented hot
      weather diagnosis in India during March-April 2022. MAUSAM, 75(2),
      551-558. (India Meteorological Department; documents the IMD heat-wave
      definition, the 2022 March/April records, and major spells 11-21 Mar,
      26-31 Mar, 25-30 Apr.)
    doi: "10.54302/mausam.v75i2.6196"
    url: "https://mausamjournal.imd.gov.in/index.php/MAUSAM/article/view/6196"
  - citation: >-
      Zachariah, M., Arulalan, T., AchutaRao, K., Saeed, F., Jha, R.,
      Dhasmana, M. K., Mondal, A., Bonnet, R., Vautard, R., Philip, S., et al.
      (2023). Attribution of 2022 early-spring heatwave in India and Pakistan
      to climate change: lessons in assessing vulnerability and preparedness
      in reducing impacts. Environmental Research: Climate, 2(4), 045005.
      (Peer-reviewed event definition: March-April 2022 daily-maximum
      temperature over north Indian plains and southern Pakistan; ~1-in-100-yr;
      ~30x likelier and ~1 K hotter than preindustrial.)
    doi: "10.1088/2752-5295/acf4b6"
    url: "https://iopscience.iop.org/article/10.1088/2752-5295/acf4b6"
  - citation: >-
      World Weather Attribution (2022, May). Climate change made devastating
      early heat in India and Pakistan 30 times more likely. (Rapid attribution
      report preceding the peer-reviewed paper.)
    url: "https://www.worldweatherattribution.org/climate-change-made-devastating-early-heat-in-india-and-pakistan-30-times-more-likely/"
  - citation: >-
      NASA Earth Observatory (2022, April 29). Early Season Heat Waves Strike
      India. (Dated station values for the late-April wave; GEOS-5 2 m air
      temperature map for 2022-04-27.)
    url: "https://science.nasa.gov/earth/earth-observatory/early-season-heat-waves-strike-india-149766/"
  - citation: >-
      ESA (2022, April). Heatwave across India — Copernicus Sentinel-3 SLSTR
      land-surface temperature, 2022-04-29 10:30 local. LST exceeding 60 degC
      in places while air temperatures were 43-46 degC — a citable, official
      articulation of the LST-vs-air-temperature distinction (cardinal rule 2).
      Citation/context only; Sentinel-3 is not an Aether data source.
    url: "https://www.esa.int/ESA_Multimedia/Images/2022/04/Heatwave_across_India"
  - citation: >-
      BusinessToday (2022, April 30). Northwest, central India experience
      hottest April in 122 years: IMD. (Secondary press reporting of the IMD
      Director General's statement: NW India April 2022 average maximum 35.9
      degC, central India 37.78 degC, 10-20 heat-wave days vs a normal of
      1-5. Used because IMD's primary press-release URLs now 404; status
      stated, not hidden.)
    url: "https://www.businesstoday.in/latest/trends/story/northwest-central-india-experience-hottest-april-in-122-years-imd-331915-2022-04-30"

notes: |
  CANONICAL ANALYSIS WINDOW: 2022-04-02..2022-04-11 (peak qualifying-area day
  2022-04-08), selected by the committed ERA5 scan under the IMD-style
  criterion (>=40 degC AND >=+4.5 K departure; 1991-2020 day-of-year
  climatology, 09/10 UT proxy). Window diagnostics (committed scan artifacts):
  peak day 1,330 qualifying 0.25-deg cells (largest cluster 1,307), mean
  anomaly over qualifying cells +6.6 K, max cell anomaly +12.1 K, max proxy
  45.5 degC. These are OUR reanalysis-derived diagnostics (provenance: scan
  artifact), not reference values — they live here as the window's selection
  record, never as ground truth.

  HONEST RECONCILIATION with IMD's spell list: the MAUSAM paper highlights
  major spells 11-21 Mar, 26-31 Mar, 25-30 Apr ("particularly", a
  non-exhaustive list); our scan's top window Apr 2-11 is not one of them,
  but IMD's own April map (Fig. 2b) shows 10-20 heat-wave days over
  northwest/central India — more than the 25-30 Apr spell alone can supply —
  and the probe's in-situ spot-check found Jaipur ISD 2 m temperature peaking
  at 42.0 degC on 2022-04-08 (15:30 IST), the scan's peak-area day, with IMD
  gridded Tmax reading 42.7 degC at the nearest cell the same day. The
  peer-reviewed event definition (March-April 2022) contains the window
  entirely.

  RUNNABILITY: phenomenon-aware as of Sprint 9 Stage B, and the heat AIR-lane
  recipe is wired into the harness (_RECIPES): the event is RUNNABLE on
  machines with the ERA5 daily-Tmax cache (regression family vs the committed
  air_lane.json) and reports not_runnable with the honest cache-incomplete
  reason elsewhere. The Stage A EMIT-shaped reason is fixed and guard-tested.

  TIER (probe ruling, to be earned in Stage B): VALIDATED earnable for 2 m AIR
  temperature claims only (130 in-bbox ISD stations + ERA5-independent IMD
  gridded); LST claims capped at CROSS-CHECKED (no in-situ skin-temperature
  truth). ERA5-vs-station agreement is partially circular (ERA5 assimilates
  synoptic stations) — see the reference dependency graph in the Stage A
  report.

