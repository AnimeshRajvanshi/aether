# Permian Basin methane plume detected by EMIT
#
# First EMIT-observable benchmark event for the Aether platform.
# This event was detected by NASA's EMIT instrument aboard the ISS in August 2022
# and was featured in NASA's initial methane super-emitter announcements.
#
# References:
# - NASA announcement: https://www.nasa.gov/centers-and-facilities/jpl/methane-super-emitters-mapped-by-nasas-new-earth-space-mission/
# - Location: Southeast of Carlsbad, New Mexico, in the Permian Basin
# - Data source: EMIT L2B Methane Enhancement (EMITL2BCH4ENH.002)

event_id: permian_basin_2022
name: "Permian Basin methane plume (Carlsbad, NM)"
planetary_body: earth

phenomenon_type: emission_event
expected_detection_types:
  - methane_plume

# EMIT detection window: August 10 - September 13, 2022
# (After Sept 13, EMIT had a power shutdown until Jan 6, 2023)
date_range:
  start: "2022-08-01T00:00:00Z"
  end: "2022-09-13T23:59:59Z"

# Location approximately 10 miles southeast of Carlsbad, NM
# The plume extended ~2 miles (3.3 km) northward from the source
location:
  lon: -104.15
  lat: 32.25
bbox:
  min_lon: -104.20
  min_lat: 32.20
  max_lon: -104.10
  max_lat: 32.30

known_measurements:
  emission_rate_metric_tonnes_per_hr:
    value: 18.3
    uncertainty: 2.0
    unit: "tonnes/hr"
    note: >-
      NASA estimated flow rates of 20.2 tons (18.3 metric tonnes) per hour at
      the Permian site. This is equivalent to 40,300 pounds of methane per hour.
      Source: NASA JPL EMIT methane super-emitter announcement, October 2022.
  plume_length_km:
    value: 3.3
    uncertainty: 0.3
    unit: "km"
    note: >-
      The plume stretched approximately 2 miles (3.3 kilometers) northward from
      the source location.

attribution:
  operator: "Unknown"
  facility: "Oil/gas infrastructure in Permian Basin"
  sector: "oil_and_gas"

observed_by:
  - sensor: "EMIT (Earth Surface Mineral Dust Source Investigation)"
    sensor_type: "hyperspectral"
    note: >-
      EMIT hyperspectral imaging spectrometer aboard the International Space
      Station (ISS). EMIT L2B Methane Enhancement product (EMITL2BCH4ENH.002)
      at 60m resolution. EMIT launched July 14, 2022 and began science operations
      in August 2022. Data are Cloud Optimized GeoTIFFs already orthorectified
      to EPSG:4326.

references:
  - citation: >-
      NASA Jet Propulsion Laboratory. (2022). Methane 'Super-Emitters' Mapped
      by NASA's New Earth Space Mission. NASA News Release.
    url: "https://www.nasa.gov/centers-and-facilities/jpl/methane-super-emitters-mapped-by-nasas-new-earth-space-mission/"
  - citation: >-
      NASA LP DAAC. (2025). EMIT L2B Methane Enhancement Data 60 m V002.
      doi:10.5067/EMIT/EMITL2BCH4ENH.002
    doi: "10.5067/EMIT/EMITL2BCH4ENH.002"
    url: "https://www.earthdata.nasa.gov/data/catalog/lpcloud-emitl2bch4enh-002"

notes: |
  First EMIT-observable benchmark event for Sprint 1. This event validates the
  full EMIT ingestion pipeline: authentication, granule search, download,
  caching, and visualization.

  The exact granule ID(s) covering this location/date are resolved dynamically
  by the data spine's search functionality. EMIT coverage is opportunistic due
  to ISS orbit; not all locations have guaranteed coverage.

  Emission rate estimate is from NASA's public announcement. More precise
  quantification would require atmospheric modeling and is deferred to Sprint 2.

tags:
  - emit_observable
  - first_emit_event
  - super_emitter
  - permian_basin
  - oil_and_gas
