# Turkmenistan Goturdepe / Barsagelmez oil & gas methane plume cluster
#
# Sprint 2 validation event. Replaces the Permian event for Sprint 2 because:
#   1. The granule we previously pinned (20220815T042838) is over Turkmenistan,
#      NOT Carlsbad NM — verified by direct CMR query (lon 53.29 to 54.64,
#      lat 38.86 to 40.12). See docs/science/sprint2_validation.md for the full
#      investigation trail.
#   2. This event pairs a peer-reviewed quantification reference (Thorpe et al.
#      2023, Sci. Adv.) with NASA's per-granule unit absorption spectrum file
#      shipped in EMIT-Data-Resources for THIS exact granule — the matched-filter
#      target and the radiance are from the same overpass, which is required for
#      a valid Stage A.
#
# References:
# - Thorpe et al. 2023, "Attribution of individual methane and carbon dioxide
#   emission sources using EMIT observations from space", Sci. Adv. 9, eadh2391.
#   doi:10.1126/sciadv.adh2391. PMC: PMC10656068.
# - EMIT-Data-Resources tutorial Generating_Methane_Spectral_Fingerprint.ipynb,
#   which uses 20220815T042838 as its demonstration granule (and ships the
#   matching per-granule target file emit20220815t042838_ch4_target).
# - NASA L2B CH4 plume complex for this granule:
#   EMIT_L2B_CH4PLM_002_20220815T042838_000494 (one published complex).
# - NASA L2B CH4 enhancement (raster) for the same granule:
#   EMIT_L2B_CH4ENH_002_20220815T042838_2222703_003.

event_id: turkmenistan_goturdepe_2022_08_15
name: "Turkmenistan Goturdepe/Barsagelmez methane plume cluster (EMIT 2022-08-15 04:28:38 UTC)"
planetary_body: earth

phenomenon_type: emission_event
expected_detection_types:
  - methane_plume

# Single-overpass acquisition window. The Thorpe 2023 number aggregates two
# overpasses (04:28 UTC and 10:58 UTC); our Sprint 2 pipeline processes the
# 04:28 granule only.
date_range:
  start: "2022-08-15T04:28:00Z"
  end: "2022-08-15T04:30:00Z"

# Center of the Goturdepe oil & gas field. Source point used by Thorpe 2023
# for the cluster. The bbox covers the granule footprint reported by CMR.
location:
  lon: 54.0
  lat: 39.5
bbox:
  min_lon: 53.29
  min_lat: 38.86
  max_lon: 54.64
  max_lat: 40.12

known_measurements:
  emission_rate_metric_tonnes_per_hr:
    value: 163.0
    uncertainty: 18.0
    unit: "tonnes/hr"
    # Twelve distinct sources, per Thorpe et al. 2023 (also stated in the note
    # below). Structured so the dashboard can source the single-vs-cluster
    # comparability framing without parsing prose.
    n_sources: 12
    note: >-
      Cluster TOTAL for twelve methane sources at the Goturdepe and
      Barsagelmez fields, attributed by Thorpe et al. 2023 (Sci. Adv. 9
      eadh2391) to the 2022-08-15 overpass. This is a multi-source, multi-
      granule sum; the single granule 20220815T042838 carries one
      NASA-identified plume complex (EMIT_L2B_CH4PLM_002_20220815T042838_000494)
      and is one slice of the overall 4:28 UTC strip. A Sprint 2 single-
      granule IME will recover a subset of this cluster total — when
      comparing, sum our identified plumes across the strip-covering
      granules before checking against 163 ± 18 t/hr.

attribution:
  operator: "Unknown / multiple"
  facility: "Goturdepe and Barsagelmez oil & gas fields"
  sector: "oil_and_gas"

observed_by:
  - sensor: "EMIT (Earth Surface Mineral Dust Source Investigation)"
    sensor_type: "hyperspectral"
    note: >-
      EMIT hyperspectral imaging spectrometer aboard the ISS. Single granule
      EMIT_L1B_RAD_001_20220815T042838_2222703_003 at 60 m GSD. Imaging
      conditions per Thorpe 2023: 04:28 UTC, 54 degrees solar zenith.

# Sprint 2 canonical acquisition. NASA-Data-Resources tutorial supplies the
# matching per-granule unit absorption spectrum (k) target for this granule,
# making Stage A a valid implementation test of the EMIT GHG matched-filter
# algorithm against NASA's operational result on the same inputs.
canonical_acquisition:
  utc: "2022-08-15T04:28:38Z"
  l1b_granule_ur: "EMIT_L1B_RAD_001_20220815T042838_2222703_003"
  l2a_mask_granule_ur: "EMIT_L2A_MASK_002_20220815T042838_2222703_003"
  l2b_ch4_granule_ur: "EMIT_L2B_CH4ENH_002_20220815T042838_2222703_003"
  source: >-
    Granule pinned for Sprint 2 because NASA ships the matching per-granule
    methane unit absorption spectrum file
    (data/methane_tutorial/emit20220815t042838_ch4_target in nasa/EMIT-Data-Resources)
    that was generated from THIS granule's MODTRAN simulation; using it on
    any other granule is invalid. The same overpass is the validation event
    in Thorpe et al. 2023.

references:
  - citation: >-
      Thorpe, A. K., et al. (2023). Attribution of individual methane and
      carbon dioxide emission sources using EMIT observations from space.
      Science Advances, 9(46), eadh2391.
    doi: "10.1126/sciadv.adh2391"
    url: "https://www.science.org/doi/10.1126/sciadv.adh2391"
  - citation: >-
      NASA LP DAAC. EMIT L2B Estimated Methane Plume Complexes 60 m V002.
      Plume complex EMIT_L2B_CH4PLM_002_20220815T042838_000494 corresponds
      to this granule.
    doi: "10.5067/EMIT/EMITL2BCH4PLM.002"
    url: "https://www.earthdata.nasa.gov/data/catalog/lpcloud-emitl2bch4plm-002"
  - citation: >-
      NASA LP DAAC. EMIT L2B Methane Enhancement Data 60 m V002. The raster
      EMIT_L2B_CH4ENH_002_20220815T042838_2222703_003 is used as the
      Stage A spatial-agreement reference.
    doi: "10.5067/EMIT/EMITL2BCH4ENH.002"
    url: "https://www.earthdata.nasa.gov/data/catalog/lpcloud-emitl2bch4enh-002"
  - citation: >-
      NASA EMIT-Data-Resources tutorial Generating_Methane_Spectral_Fingerprint.ipynb.
      Ships the per-granule methane target spectrum file
      emit20220815t042838_ch4_target used as our matched-filter unit
      absorption spectrum k.
    url: "https://github.com/nasa/EMIT-Data-Resources/blob/main/python/tutorials/Generating_Methane_Spectral_Fingerprint.ipynb"

notes: |
  This benchmark validates our matched-filter implementation against NASA's
  operational EMIT L2B CH4 ENH for the same granule, using NASA's per-granule
  unit absorption spectrum. The Stage A test is therefore an implementation
  test (does our code reproduce NASA's algorithm on the same inputs) rather
  than an independent physics test (which would require us to generate k from
  HITRAN). The independence limitation is recorded in
  docs/science/sprint2_validation.md.

  The 163 ± 18 t/hr Thorpe number is a multi-source cluster total across
  Goturdepe and Barsagelmez, attributed to the August 15, 2022 imaging date
  which Thorpe states covered the area twice (04:28 UTC and 10:58 UTC).
  A single-granule Sprint 2 IME will not directly equal this number.

tags:
  - emit_observable
  - oil_and_gas
  - super_emitter_cluster
  - peer_reviewed_reference
  - sprint2_canonical
