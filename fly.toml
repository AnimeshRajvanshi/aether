# Fly.io config for the Aether API (Sprint 10 Stage C; Gate A + Stage B rulings).
#
# - Always-on per the Gate A decision: auto_stop OFF, one machine always running
#   (~$2/mo accepted) — no cold-start theater in a portfolio demo.
# - Smallest machine: shared-cpu-1x / 256 MB (measured runtime RAM: ~50 MiB).
# - Region: lax (Los Angeles — Fly's US region nearest the human).
# - Single uvicorn worker (set in the Dockerfile CMD; rationale in docs/deployment.md).
# - GIT_SHA is passed at deploy time (`--build-arg GIT_SHA=$(git rev-parse HEAD)`).
#   There is deliberately NO default here: a missing SHA fails startup loudly
#   (AETHER_ENV=production) instead of deploying an unverifiable image.
# - AETHER_ALLOWED_ORIGINS is public config, not a secret: the production web
#   origin + localhost dev origins (Stage B gate). The default *.vercel.app
#   domain is intentionally NOT an allowed origin — the custom domain is the
#   product origin.

app = "aether-api-arkaneworks"
primary_region = "lax"

[env]
  AETHER_ALLOWED_ORIGINS = "https://aether.arkaneworks.co,http://localhost:3000,http://127.0.0.1:3000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
