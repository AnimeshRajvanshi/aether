[project]
name = "aether-causal"
version = "0.1.0"
description = "Aether causal / source-attribution engine — ranked source hypotheses"
requires-python = ">=3.12,<3.13"
dependencies = [
    "aether-ontology",
    "pydantic>=2.7",
    "pyproj>=3.6",
    "shapely>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aether_causal"]
