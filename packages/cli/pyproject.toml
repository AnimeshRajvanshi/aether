[project]
name = "aether-cli"
version = "0.1.0"
description = "Aether command-line interface — reproduce, ingest, analyze"
requires-python = ">=3.12,<3.13"
dependencies = [
    "aether-ontology",
    "aether-data-spine",
    "aether-eval",
    "typer>=0.12",
    "rich>=13.7",
    "matplotlib>=3.8",
    "cartopy>=0.22",
    "pillow>=10.0",
]

[project.scripts]
aether = "aether_cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aether_cli"]
