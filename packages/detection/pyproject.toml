[project]
name = "aether-detection"
version = "0.1.0"
description = "Aether detection & quantification — matched-filter methane retrieval and IME quantification"
requires-python = ">=3.12,<3.13"
dependencies = [
    "aether-ontology",
    "numpy>=1.26",
    "xarray>=2024.0",
    "scipy>=1.13",
    "hitran-api>=1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aether_detection"]
