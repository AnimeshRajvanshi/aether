[project]
name = "aether-ontology"
version = "0.1.0"
description = "Aether planetary ontology — typed entities for observations, detections, phenomena, hypotheses, briefs"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aether_ontology"]
